spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/users,/users/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/products,/products/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/orders,/orders/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  info:
    title: API Gateway
    description: Single entry point for all microservices
    version: 1.0.0
    contact:
      name: Cloud Computing Course
      email: support@example.com

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    pt.ulusofona.apigateway: DEBUG